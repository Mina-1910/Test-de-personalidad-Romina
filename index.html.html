<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test: Tu Animal Viral</title>
    <style>
        :root {
            --blanco: #ffffff;
            --amarillo: #ffeb3b;
            --azul: #007bff;
            --rosa: #ff007f;
            --morado: #8a2be2;
            --negro: #222222;
        }

        body {
            background-color: var(--blanco);
            color: var(--azul);
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background-color: var(--blanco);
            padding: 30px;
            border: 5px solid var(--morado);
            border-radius: 30px;
            box-shadow: 10px 10px 0px var(--rosa);
        }

        h1 {
            color: var(--rosa);
            text-align: center;
            font-size: 2.5rem;
            text-shadow: 2px 2px var(--amarillo);
        }

        .pregunta-titulo {
            background-color: var(--amarillo);
            color: var(--negro);
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
            border: 2px solid var(--morado);
        }

        .opcion {
            display: block;
            margin: 10px 0;
            padding: 12px;
            border: 2px solid var(--azul);
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--rosa);
            font-weight: bold;
        }

        .opcion:hover {
            background-color: var(--rosa);
            color: var(--blanco);
            transform: scale(1.02);
        }

        input[type="radio"] {
            margin-right: 10px;
            accent-color: var(--morado);
        }

        button {
            width: 100%;
            background-color: var(--morado);
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--rosa);
            letter-spacing: 2px;
        }

        #resultado {
            display: none;
            text-align: center;
            animation: bounceIn 0.8s;
        }

        .animal-img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 20px;
            border: 4px solid var(--morado);
            margin: 20px 0;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.1); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>¿Qué Animal Viral Eres?</h1>
    <form id="quizForm">
        <div id="preguntas-contenedor"></div>
        <button type="button" onclick="calcular()">¡DESCUBRIR MI ANIMAL!</button>
    </form>

    <div id="resultado">
        <h2 style="color: var(--azul)">¡Eres un...</h2>
        <h1 id="animalNombre"></h1>
        <img id="animalImagen" class="animal-img" src="" alt="Animal">
        <p id="descripcion" style="color: var(--negro); font-size: 1.2rem;"></p>
        <button onclick="location.reload()" style="font-size: 1rem;">Reiniciar Test</button>
    </div>
</div>

<script>
    const preguntas = [
        "¿Cómo llamarías la atención en redes sociales?",
        "¿Cuál es tu lugar favorito para estar?",
        "Si alguien te molesta, tú...",
        "¿Cuál es tu comida favorita?",
        "¿Cómo te describen tus amigos?",
        "¿Qué haces en un día de lluvia?",
        "¿Cuál es tu súper poder ideal?",
        "¿Cómo reaccionas ante un abrazo?",
        "¿Qué objeto no puede faltar en tu cuarto?",
        "En un apocalipsis zombie, tú..."
    ];

    const opciones = [
        ["Haciendo un grito dramático e icónico", "Siendo el más lindo y tierno", "Mirando a la cámara con desprecio", "Robando algo y saliendo corriendo", "Dándole la mano a alguien"],
        ["La playa o el mar", "Cualquier lugar donde haya gente", "Un rincón oscuro y silencioso", "Cerca de la cocina o el basurero", "Flotando en un río tranquilo"],
        ["Grito hasta que se asusten", "Muevo la cola y trato de ser su amigo", "Lo ignoro por completo", "Le escondo las llaves de su casa", "Busco refugio con mi grupo"],
        ["Pescado crudo", "¡Todo lo que sea comestible!", "Atún de lata premium", "Cualquier cosa que encuentre", "Unas ricas almejas"],
        ["El alma de la fiesta", "El más leal y fiel", "El misterioso e independiente", "El genio del caos", "El pegajoso y cariñoso"],
        ["¡A nadar se ha dicho!", "Salgo a saltar en los charcos", "Me enrosco y duermo", "Busco qué puedo inspeccionar", "Me quedo abrazado a alguien"],
        ["Voz que se escucha a kilómetros", "Amabilidad infinita", "Invisibilidad", "Manos súper ágiles", "Paz interior absoluta"],
        ["¡Me encanta, lo pido a gritos!", "¡Cualquier muestra de amor es gloria!", "Solo si yo quiero y cuando yo quiera", "Aprovecho para revisar tus bolsillos", "No me sueltes nunca, por favor"],
        ["Un megáfono", "Una pelota de tenis", "Una caja de cartón", "Herramientas o cosas brillantes", "Una almohada gigante"],
        ["Hago un show para distraerlos", "Ayudo a todos a escapar", "Sobrevivo solo por mi cuenta", "Me hago el líder de la banda", "Me quedo con mi familia unido"]
    ];

    const contenedor = document.getElementById('preguntas-contenedor');
    preguntas.forEach((p, i) => {
        let html = `<div style="margin-bottom:20px;">
            <div class="pregunta-titulo">${i+1}. ${p}</div>`;
        ['A','B','C','D','E'].forEach((letra, j) => {
            html += `<label class="opcion">
                <input type="radio" name="p${i}" value="${letra}" required> ${opciones[i][j]}
            </label>`;
        });
        html += `</div>`;
        contenedor.innerHTML += html;
    });

    function calcular() {
        const form = document.getElementById('quizForm');
        const data = new FormData(form);
        const counts = {A:0, B:0, C:0, D:0, E:0};
        let count = 0;
        for(let v of data.values()){ counts[v]++; count++; }

        if(count < 10) { alert("¡Responde todas!"); return; }

        let max = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        
        const info = {
            'A': { n: 'León Marino', d: 'Eres el rey del drama y el carisma. ¡Naciste para brillar!', img: 'https://images.unsplash.com/photo-1591485423007-765bde4139ef?q=80&w=500&auto=format&fit=crop' },
            'B': { n: 'Golden Retriever', d: 'Eres un sol, todo el mundo te ama por tu gran corazón.', img: 'https://images.unsplash.com/photo-1552053831-71594a27632d?q=80&w=500&auto=format&fit=crop' },
            'C': { n: 'Gato Negro', d: 'Misterioso, elegante y dueño de tu propio destino.', img: 'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=500&auto=format&fit=crop' },
            'D': { n: 'Mapache', d: 'Inteligente y travieso. Siempre consigues lo que quieres.', img: 'https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=500&auto=format&fit=crop' },
            'E': { n: 'Nutria', d: 'Eres pura ternura. Valoras la unión y los abrazos sobre todo.', img: 'https://images.unsplash.com/photo-1544214485-80252189d909?q=80&w=500&auto=format&fit=crop' }
        };

        document.getElementById('quizForm').style.display = 'none';
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('animalNombre').innerText = info[max].n;
        document.getElementById('animalNombre').style.color = 'var(--rosa)';
        document.getElementById('descripcion').innerText = info[max].d;
        document.getElementById('animalImagen').src = info[max].img;
    }
</script>

</body>
</html>
